<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>De verantwoordelijkheid tegenover de toekomst</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="De verantwoordelijkheid tegenover de toekomst">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/pure.css">
  
  <style>
    body {
      font-family: "Georgia", "Palatino Linotype", "Times New Roman", serif;
      font-size: 19px;
      line-height: 1.8;
      color: #2c3e50;
      background-color: #fdfdfd;
    }
    .sidebar {
      font-family: "Helvetica Neue", sans-serif;
      font-size: 15px;
      background-color: #f7f7f7;
      border-right: 1px solid #eaeaea;
      padding-top: 20px;
    }
    .sidebar ul li a {
      color: #555;
      text-decoration: none;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 2rem;
    }
    h1, h2, h3, h4 {
      font-family: "Helvetica Neue", sans-serif;
      font-weight: 400;
      color: #333;
      margin-top: 2em;
    }
    h1 { font-size: 2.5em; border-bottom: none; margin-bottom: 1em; }
    .markdown-section a {
      color: #2980b9;
      text-decoration: none;
      border-bottom: 1px dotted #2980b9;
    }
    blockquote {
      border-left: 4px solid #ddd;
      margin-left: 0;
      padding-left: 20px;
      color: #666;
      font-style: italic;
    }
    /* Extra styling voor de versie-switcher in de sidebar */
    .sidebar .version-switcher {
      display: flex;
      flex-direction: column;
      padding: 0 15px 5px 15px;
      margin-top: -10px;
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .sidebar .version-switcher .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .sidebar .version-switcher a {
      font-size: 11px;
      color: #999;
      text-decoration: none !important;
      border-bottom: none !important;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .sidebar .version-switcher a.active {
      color: #2c3e50;
      font-weight: bold;
    }
    .sidebar .version-switcher a:hover {
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="app">Het boek wordt geladen...</div>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const track = urlParams.get('t') || 'manueel';
    const version = urlParams.get('v') || 'origineel';
    
    let trackPath = track === 'ai' ? '02-AI-Gegenereerd' : '01-Manueel-Manuscript';
    
    let versionPath = 'Het-Boek-Origineel/';
    if (version === 'eenvoudig') versionPath = 'Het-Boek-Eenvoudig/';
    if (version === 'ai') versionPath = 'Het-Boek-AI/';

    window.$docsify = {
      name: (track === 'ai' ? '[AI] ' : '[M] ') + 'De Toekomst',
      basePath: trackPath + '/' + versionPath,
      homepage: 'README.md',
      loadSidebar: '_sidebar.md?v=' + new Date().getTime(),
      subMaxLevel: 3,
      auto2top: true,
      mergeNavbar: true,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script>
    // Functie om de actieve links in de versie-switcher te markeren
    function markActiveLinks() {
      const params = new URLSearchParams(window.location.search);
      const track = params.get('t') || 'manueel';
      const version = params.get('v') || 'origineel';

      document.querySelectorAll('.version-switcher a').forEach(link => {
        const href = link.getAttribute('href');
        if (href.includes(`t=${track}`) || (href.startsWith('?v=') && href.includes(`v=${version}`))) {
          // We moeten specifiek zijn: als de link een traject bevat, check traject. Als het alleen een versie bevat, check versie.
          if (href.includes('t=') && href.includes(`t=${track}`)) {
            link.classList.add('active');
          } else if (!href.includes('t=') && href.includes(`v=${version}`)) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        } else {
          link.classList.remove('active');
        }
      });
    }

    // Docsify hook om de actieve links te markeren nadat de sidebar is geladen
    window.$docsify.plugins = [
      function(hook) {
        hook.doneEach(function() {
          markActiveLinks();
        });
      }
    ];
  </script>
</html>
