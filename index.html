<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>De Competente Toekomst</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="De Competente Toekomst">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/pure.css">
  
  <style>
    body {
      font-family: "Georgia", "Palatino Linotype", "Times New Roman", serif;
      font-size: 19px;
      line-height: 1.8;
      color: #2c3e50;
      background-color: #fdfdfd;
    }
    .sidebar {
      font-family: "Helvetica Neue", sans-serif;
      font-size: 15px;
      background-color: #f7f7f7;
      border-right: 1px solid #eaeaea;
      padding-top: 20px;
    }
    .sidebar ul li a {
      color: #555;
      text-decoration: none;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 2rem;
    }
    h1, h2, h3, h4 {
      font-family: "Helvetica Neue", sans-serif;
      font-weight: 400;
      color: #333;
      margin-top: 2em;
    }
    h1 { font-size: 2.5em; border-bottom: none; margin-bottom: 1em; }
    .markdown-section a {
      color: #2980b9;
      text-decoration: none;
      border-bottom: 1px dotted #2980b9;
    }
    blockquote {
      border-left: 4px solid #ddd;
      margin-left: 0;
      padding-left: 20px;
      color: #666;
      font-style: italic;
    }
    /* Extra styling voor de versie-switcher in de sidebar */
    .sidebar .version-switcher {
      font-size: 13px;
      padding: 0 0 15px 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      color: #999;
    }
    .sidebar .version-switcher a {
      color: #777;
      text-decoration: none;
    }
    .sidebar .version-switcher a:hover {
      color: #2980b9;
    }
  </style>
</head>
<body>
  <div id="app">Het boek wordt geladen...</div>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const version = urlParams.get('v') || 'origineel';
    
    let basePath = 'Het-Boek-Origineel/';
    let name = 'De Competente Toekomst';

    if (version === 'eenvoudig') {
      basePath = 'Het-Boek-Eenvoudig/';
    } else if (version === 'ai') {
      basePath = 'Het-Boek-AI/';
    }

    window.$docsify = {
      name: name,
      basePath: basePath,
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      mergeNavbar: true,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
