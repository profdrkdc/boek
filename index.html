<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>De verantwoordelijkheid tegenover de toekomst</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="De verantwoordelijkheid tegenover de toekomst">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/pure.css">
  
  <style>
    body {
      font-family: "Georgia", "Palatino Linotype", "Times New Roman", serif;
      font-size: 19px;
      line-height: 1.8;
      color: #2c3e50;
      background-color: #fdfdfd;
    }
    .sidebar {
      font-family: "Helvetica Neue", sans-serif;
      font-size: 15px;
      background-color: #f7f7f7;
      border-right: 1px solid #eaeaea;
      padding-top: 20px;
    }
    .sidebar ul li a {
      color: #555;
      text-decoration: none;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 2rem;
    }
    h1, h2, h3, h4 {
      font-family: "Helvetica Neue", sans-serif;
      font-weight: 400;
      color: #333;
      margin-top: 2em;
    }
    h1 { font-size: 2.5em; border-bottom: none; margin-bottom: 1em; }
    .markdown-section a {
      color: #2980b9;
      text-decoration: none;
      border-bottom: 1px dotted #2980b9;
    }
    blockquote {
      border-left: 4px solid #ddd;
      margin-left: 0;
      padding-left: 20px;
      color: #666;
      font-style: italic;
    }
    
    /* Dynamische Switcher Styling */
    .version-switcher {
      display: flex;
      flex-direction: column;
      padding: 0 15px 15px 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    .version-switcher .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .version-switcher a {
      font-size: 11px;
      color: #aaa;
      text-decoration: none !important;
      border-bottom: none !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .version-switcher a.active {
      color: #2c3e50;
      font-weight: bold;
    }
    .version-switcher a:hover {
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="app">Het boek wordt geladen...</div>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const track = urlParams.get('t') || 'manueel';
    const version = urlParams.get('v') || 'origineel';
    
    let trackPath = track === 'ai' ? '02-AI-Gegenereerd' : '01-Manueel-Manuscript';
    let versionPath = 'Het-Boek-Origineel/';
    if (version === 'eenvoudig') versionPath = 'Het-Boek-Eenvoudig/';
    if (version === 'ai') versionPath = 'Het-Boek-AI/';

    window.$docsify = {
      name: (track === 'ai' ? '[AI] ' : '[M] ') + 'De Toekomst',
      basePath: trackPath + '/' + versionPath,
      homepage: 'README.md',
      loadSidebar: '_sidebar.md?v=' + new Date().getTime(),
      subMaxLevel: 3,
      auto2top: true,
      
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            // We injecteren de switcher bovenaan de content van de sidebar
            // Maar Docsify heeft een betere plek: de sidebar header
          });

          hook.doneEach(function() {
            // Injecteer de switcher in de sidebar
            const sidebarNav = document.querySelector('.sidebar-nav');
            if (sidebarNav && !document.querySelector('.version-switcher')) {
              const switcher = document.createElement('div');
              switcher.className = 'version-switcher';
              
              const t = track;
              const v = version;

              switcher.innerHTML = `
                <div class="row">
                  <a href="?t=manueel&v=${v}" class="${t === 'manueel' ? 'active' : ''}">Manueel</a>
                  <a href="?t=ai&v=${v}" class="${t === 'ai' ? 'active' : ''}">AI-Gegenereerd</a>
                </div>
                <div class="row">
                  <a href="?t=${t}&v=eenvoudig" class="${v === 'eenvoudig' ? 'active' : ''}">Eenvoudig</a>
                  <a href="?t=${t}&v=ai" class="${v === 'ai' ? 'active' : ''}">AI</a>
                  <a href="?t=${t}&v=origineel" class="${v === 'origineel' ? 'active' : ''}">Origineel</a>
                </div>
              `;
              sidebarNav.insertBefore(switcher, sidebarNav.firstChild);
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
